<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>اشرح لي الكود - Code Explainer</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="background-effects">
        <div class="glow glow-1"></div>
        <div class="glow glow-2"></div>
        <div class="glow glow-3"></div>
    </div>

    <div class="container">
        <header>
            <div class="logo">
                <i class="fa-solid fa-code"></i>
                <h1>اشرح لي الكود</h1>
            </div>
            <p class="subtitle">قم بلصق أي كود وسنقوم بشرحه لك خطوة بخطوة بطريقة مبسطة.</p>
        </header>

        <main>
            <section class="editor-section">
                <div class="editor-header">
                    <div class="mac-buttons">
                        <span></span><span></span><span></span>
                    </div>
                    <span class="language-badge">كود الإدخال</span>
                </div>
                <div class="editor-body">
                    <textarea id="codeInput" placeholder="الصق الكود هنا...
مثال:
function greet(name) {
    console.log('مرحباً، ' + name);
}" spellcheck="false"></textarea>
                </div>
            </section>

            <div class="action-container">
                <button id="explainBtn" class="primary-btn">
                    <span class="btn-text">اشرح الكود الآن</span>
                    <i class="fa-solid fa-wand-magic-sparkles"></i>
                </button>
            </div>

            <section id="resultsSection" class="results-section hidden">
                <h2 class="section-title"><i class="fa-solid fa-list-check"></i> شرح الكود:</h2>
                <div id="loadingIndicator" class="loading-container hidden">
                    <div class="spinner"></div>
                    <p>جاري تحليل الكود واستخراج الشرح...</p>
                </div>
                <div id="explanationContainer" class="explanation-container">
                    <!-- Steps will be injected here by JS -->
                </div>
                
                <div id="summaryCard" class="summary-card hidden">
                    <h3><i class="fa-solid fa-lightbulb"></i> الملخص:</h3>
                    <p id="summaryText"></p>
                </div>
            </section>
        </main>

        <footer>
            <p>hadil mehenni</p>
        </footer>
    </div>

    <script src="script.js"></script>
</body>
</html>
